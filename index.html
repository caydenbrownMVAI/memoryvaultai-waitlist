<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryVaultAI — Never Lose a Saved Video Again</title>
  <meta name="description" content="AI-powered search for your saved videos. Just describe what you remember. Join the waitlist.">
  <meta property="og:title" content="MemoryVaultAI — Never Lose a Saved Video Again">
  <meta property="og:description" content="AI-powered search for your saved TikToks, Reels, and YouTube videos. Describe what you remember, find it instantly.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://join.memoryvaultai.app">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
      background: #000;
      color: #f5f5f7;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }

    /* ── Logo ── */
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      margin-bottom: 64px;
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0s forwards;
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.08;
      letter-spacing: -0.04em;
      max-width: 560px;
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0.08s forwards;
    }

    /* ── Subheadline ── */
    .sub {
      font-size: clamp(1.05rem, 2.5vw, 1.25rem);
      font-weight: 400;
      color: #86868b;
      text-align: center;
      line-height: 1.5;
      max-width: 400px;
      margin-top: 20px;
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0.16s forwards;
    }

    /* ── Form ── */
    .form-area {
      margin-top: 56px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0.24s forwards;
    }

    input[type="email"] {
      width: 100%;
      height: 56px;
      padding: 0 20px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 400;
      color: #f5f5f7;
      background: #1d1d1f;
      border: 1px solid #424245;
      border-radius: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]::placeholder {
      color: #6e6e73;
    }

    input[type="email"]:focus {
      border-color: #1DB8D4;
    }

    .cta {
      width: 100%;
      height: 56px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #000;
      background: #1DB8D4;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .cta:hover { opacity: 0.85; }
    .cta:active { opacity: 0.7; }
    .cta:disabled { opacity: 0.35; cursor: default; }

    /* ── Feedback ── */
    .feedback {
      min-height: 24px;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 500;
      margin-top: 4px;
    }

    .feedback:empty { visibility: hidden; }
    .fb-error { color: #ff453a; }
    .fb-dupe { color: #1DB8D4; }

    /* ── Success ── */
    .success {
      display: none;
      text-align: center;
      margin-top: 56px;
      max-width: 380px;
    }

    .success.active {
      display: block;
      animation: rise 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .success h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .success p {
      font-size: 1rem;
      color: #86868b;
      line-height: 1.5;
    }

    /* ── Counter ── */
    .counter {
      margin-top: 24px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #86868b;
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .counter.visible { opacity: 1; }
    .counter strong { color: #f5f5f7; }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: center;
      gap: 24px;
      background: linear-gradient(transparent, #000 60%);
    }

    footer a {
      font-size: 0.75rem;
      font-weight: 400;
      color: #6e6e73;
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: #f5f5f7; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .page { padding: 60px 20px 100px; }
      .logo { width: 56px; height: 56px; border-radius: 14px; margin-bottom: 48px; }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">

    <img src="/logo.png" alt="MemoryVaultAI" class="logo">

    <h1>Never lose a saved video again.</h1>

    <p class="sub">AI-powered search for your saved videos. Just describe what you remember.</p>

    <div class="form-area" id="formArea">
      <input type="email" id="email" placeholder="Email" autocomplete="email">
      <button class="cta" id="cta" onclick="submitEmail()">Join the Waitlist</button>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="success" id="success">
      <h2>You're on the list.</h2>
      <p>We'll let you know when MemoryVaultAI is ready.</p>
    </div>

    <div class="counter" id="counter"></div>

  </div>

  <footer>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
    <a href="https://instagram.com/memoryvaultai" target="_blank" rel="noopener">Instagram</a>
  </footer>

  <script>
    const SB = 'https://qwiyntxzbfyhwkvjkeun.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3aXludHh6YmZ5aHdrdmprZXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExOTAzMTQsImV4cCI6MjA4Njc2NjMxNH0.igvD66azZWnU2AaWTlQ0_VOt_w73bVHQWj2RCrYdrDY';

    function src() {
      const p = new URLSearchParams(location.search);
      return p.get('ref') || p.get('utm_source') || 'direct';
    }

    async function submitEmail() {
      const input = document.getElementById('email');
      const btn = document.getElementById('cta');
      const fb = document.getElementById('feedback');
      const email = input.value.trim().toLowerCase();

      fb.textContent = '';
      fb.className = 'feedback';

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        fb.textContent = 'Enter a valid email address.';
        fb.classList.add('fb-error');
        input.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Joining...';

      try {
        const res = await fetch(`${SB}/rest/v1/waitlist`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': KEY,
            'Authorization': `Bearer ${KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ email, source: src() })
        });

        if (res.ok || res.status === 201) {
          document.getElementById('formArea').style.display = 'none';
          document.getElementById('success').classList.add('active');
          loadCount();
        } else {
          const data = await res.json().catch(() => null);
          if (res.status === 409 || data?.code === '23505' || data?.message?.includes('duplicate') || data?.message?.includes('unique')) {
            fb.textContent = "You're already on the list.";
            fb.classList.add('fb-dupe');
          } else {
            throw new Error();
          }
        }
      } catch (e) {
        fb.textContent = 'Something went wrong. Try again.';
        fb.classList.add('fb-error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Join the Waitlist';
      }
    }

    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); submitEmail(); }
    });

    async function loadCount() {
      try {
        const res = await fetch(`${SB}/rest/v1/rpc/waitlist_count`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
        });
        const n = await res.json();
        if (n >= 10) {
          const el = document.getElementById('counter');
          el.innerHTML = `<strong>${n.toLocaleString()}</strong> people on the waitlist`;
          el.classList.add('visible');
        }
      } catch (e) {}
    }

    loadCount();
  </script>
</body>
</html>
